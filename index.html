<!doctype html>
<html lang="gl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Clinica dental Sonrisa, pagina web oficial para reservar citas de servicios y contacto.">
    <meta name="keywords" content="dentista, clínica dental, limpeza dental, odontoloxía, urxencias odontolóxicas">
    <title>Clínica Dental</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="imagenes/favicon.ico" type="image/ico">
  </head>

  <body>
    <header>
      <div>Logo</div>
      <nav class="menu">
        <a>Inicio</a>
        <a>Servizos</a>
        <a>Contacto</a>
      </nav>
    </header>

    <main>
      <div id="inicio">
        <h1>Benvidos á nosa clínica</h1>
        <p>Coidamos do teu sorriso en Santiago</p>
      </div>

      <div id="servizos">
        <h2>Os nosos servizos</h2>
        <div class="servizos">
          <div class="servizo">
            <h3>Limpieza Dental</h3>
            <p>Profesional</p>
          </div>
          <div class="servizo">
            <h3>Revisións</h3>
            <p>Chequeos</p>
          </div>
          <div class="servizo">
            <h3>Urxencias</h3>
            <p>Dispoñibles</p>
          </div>
        </div>
      </div>

      <div id="contacto">
        <h2>Pide cita</h2>
        <form id="formulario-cita">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required/>
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" required/>
          <button type="submit">Enviar</button>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 Clínica Dental Sonrisa</p>
      <p>Calle Ficticia, 123 - Santiago</p>
    </footer>
    <script src="script/main.js"></script>
  </body>
</html>
